<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約フォーム</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        /* 右端の細いナビ（固定） */
        .side-nav {
            position: fixed;
            /* 画面スクロールしても固定 */
            right: -5px;
            /* さらに右へ */
            top: 80%;
            /* 画面中央に固定 */
            transform: translateY(-50%) translateX(10px);
            /* 中央配置と右ずらし */
            background: #3e3f41;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
            width: 35px;
            /* さらに細く */
        }

        .side-nav a:active {
            transform: scale(1.0);
            /* タップした後に元のサイズに戻す */
        }

        .side-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 10px;
            margin: 5px 0;
            padding: 5px;
            transition: background 0.3s, transform 0.2s;
            border-radius: 5px;
            width: 30px;
            height: 30px;
            text-align: center;
        }

        .side-nav a span {
            font-size: 24px;
            /* 矢印をさらに大きく */
            position: absolute;
            left: 2px;
            /* 左端に寄せる */
            top: 13px;
            /* さらに下へ */
        }

        /* スマホ用の微調整 */
        @media (max-width: 600px) {
            .side-nav {
                right: 2px;
                /* スマホではさらに右端に */
                width: 30px;
                /* もっと細く */
            }

            .side-nav a {
                width: 28px;
                height: 28px;
            }

            .side-nav a i {
                font-size: 12px;
                /* スマホではもっと小さく */
            }
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fcf9f2;
            /* Cream background */
            background-image: linear-gradient(#e8e0d5 1px, transparent 1px);
            /* Notebook lines */
            background-size: 100% 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            overflow-x: hidden;
            color: #5a4a42;
            /* Warm brown text */
        }

        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(90, 74, 66, 0.08);
            /* Soft warm shadow */
            width: 90%;
            max-width: 500px;
            padding: 30px;
            box-sizing: border-box;
            margin: 0 auto 40px auto;
            border: 1px solid #f0e6d2;
        }

        h1 {
            background: none;
            color: #e76f51;
            /* Soft coral/orange */
            padding: 10px;
            text-align: center;
            display: block;
            margin: 0 0 20px 0;
            font-size: 28px;
            font-weight: 700;
            box-shadow: none;
            text-shadow: 2px 2px 0px #fff, 3px 3px 0px #f4a261;
            border-bottom: 2px dashed #f4a261;
        }

        .label {
            display: block;
            margin-bottom: 10px;
            padding: 5px 10px;
            font-weight: 700;
            background-color: #84a59d;
            /* Sage green pill */
            color: #ffffff;
            border-radius: 20px;
            font-size: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: none;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .labeltyuuou {
            display: block;
            margin-bottom: 20px;
            padding: 3px;
            background-color: #ffffff;
            color: #1f1f20;
            border-radius: 0px;
            font-size: 18px;
            text-align: center;
            text-indent: 0px;
            position: relative;
            overflow: hidden;
            border-top: none;
            border-bottom: 2px solid #84a59d;
        }

        .labelContent {
            display: block;
            margin-bottom: 10px;
            padding: 8px;
            font-weight: 400;
            background-color: #ffffff;
            color: #5a4a42;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #f2cc8f;
        }

        /* 必須マークのスタイル */
        .required {
            color: #e76f51;
            /* Soft coral */
            font-weight: 700;
            margin-left: 5px;
            font-size: 0.8em;
            background-color: #fff;
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid #e76f51;
        }

        .required-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #13ca5e;
            font-weight: bold;
            font-size: 0.9em;
            border-radius: 4px;
            padding: 2px 6px;
            border: 2px solid #13ca5e;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0d0b8;
            /* Soft beige border */
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            color: #5a4a42;
            background-color: #fffcf8;
            transition: all 0.3s;
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            border-color: #f4a261;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.2);
        }

        .visit-buttons,
        .symptoms,
        .menu-sections,
        .irradiations {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .visit-buttons button,
        .symptoms button,
        .menu-sections button,
        .irradiations button {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #f2cc8f;
            /* Soft yellow/orange border */
            border-radius: 30px;
            /* Pill shape */
            background-color: #ffffff;
            color: #5a4a42;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            min-width: 45%;
        }

        .visit-buttons button:hover,
        .symptoms button:hover,
        .menu-sections button:hover,
        .irradiations button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .visit-buttons button.active,
        .symptoms button.active,
        .menu-sections button.active,
        .irradiations button.active {
            background-color: #f28482;
            /* Pastel Red/Salmon */
            color: white;
            border-color: #f28482;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Removed old active style override */

        .date-inputs input[type="datetime-local"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .submit-button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #f28482, #f4a261);
            /* Warm gradient */
            color: #fff;
            font-size: 20px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(242, 132, 130, 0.4);
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(242, 132, 130, 0.6);
            background: linear-gradient(135deg, #f28482, #f4a261);
        }

        .calendar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        .calendar {
            flex: 1;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
        }

        .calendar table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            /* セル幅を均等にする */
        }

        .calendar th,
        .calendar td {
            font-size: 13px;
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            vertical-align: middle;
            width: auto;
            box-sizing: border-box;
            border: 1px solid #f0e6d2;
            /* Softer border */
            color: #5a4a42;
        }

        .calendar th {
            background-color: #fff9f0;
            color: #8d7b6f;
        }

        .calendar td.selected {
            background-color: #f4a261;
            color: #fff;
            border-radius: 50%;
            /* Circle selection */
            transform: scale(0.9);
        }

        .calendar th:first-child,
        .calendar td:first-child {
            width: 17%;
            /* ここで時間列の幅を調整 */
            font-size: 12.5px;
            /* フォントサイズを変更 */
        }

        .calendar th {
            background-color: #f7f7f7;
        }

        .calendar td:hover {
            background-color: #ddd;
        }

        .calendar td.selected {
            background-color: #3e3f41;
            color: #fff;
        }

        .week-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .week-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .week-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
            /* ドーン！ってくらい拡大🔥 */
        }

        .week-button:active {
            transform: scale(0.95);
            /* クリックした瞬間にギュッと縮む💥 */
        }

        .month-button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .month-button {
            padding: 10px 20px;
            background-color: #ffffff;
            color: #222222;
            border: 1px solid black;
            /* ← 外枠を黒1pxに設定 */
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            transform-origin: center center;
        }

        .month-button:hover {
            background-color: #ffffff;
            transform: scale(1.15);
            /* ドーン！ってくらい拡大🔥 */
        }

        .month-button:active {
            transform: scale(0.95);
            /* クリックした瞬間にギュッと縮む💥 */
        }

        .current-month {
            font-size: 16px;
            font-weight: 300;
            color: #3e3f41;
            margin-top: 20px;
            /* 下にずらす */
            display: inline-block;
            /* margin-top を適用しやすくする */
        }

        .loading-spinner {
            position: fixed;
            /* 画面全体に対応 */
            top: 50%;
            /* 縦中央 */
            left: 50%;
            /* 横中央 */
            transform: translate(-50%, -50%);
            display: none;
            /* 初期状態は非表示 */
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6);
            /* 半透明の黒背景で注目度アップ */
            padding: 40px;
            /* 周囲に余白をつける */
            border-radius: 10px;
            /* 角丸で柔らかい印象 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            /* 少し立体感を追加 */
        }

        .spinner {
            width: 60px;
            /* スピナーをさらに大きく */
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            /* 薄い白で枠を柔らかく */
            border-top-color: #00d1ff;
            /* 明るい青で目立たせる */
            border-radius: 50%;
            /* 丸い形状 */
            animation: spin 0.7s linear infinite;
            /* 滑らかで速い回転 */
            margin-left: 12px;
            /* スピナーを右にずらす */
        }

        .loading-text {
            margin-top: 20px;
            /* スピナーとテキストの間隔 */
            font-size: 15px;
            /* さらに大きなフォントサイズ */
            font-weight: bold;
            /* 太字で目立たせる */
            color: #ffffff;
            /* 純白で高いコントラスト */
            letter-spacing: 1px;
            /* 文字間隔を広げてモダンな印象に */
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            /* テキストに影をつけて視認性アップ */
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .available {
            color: red;
        }

        .unavailable {
            background-color: #d3d3d3;
        }

        .menu-section {
            display: none;
        }

        .menu-section.active {
            display: block;
        }

        #repairLabel,
        #repairButtons {
            display: none;
        }

        #treatment-text {
            background-color: #f9f9f9;
            padding: 16px 20px;
            border: 1px solid #000000;
            border-top: none;
            /* ← 上の横線を非表示 */
            border-radius: 0 0 3px 3px;
            /* ← 上の角の丸みをなくして自然に */
            margin-top: -13px;
            /* ← 少し上に詰める（12px → 4px） */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            font-size: 15px;
            line-height: 1.6;
            color: #000000;
        }

        .highlight-background {
            background-color: #f9f9d6;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            margin-top: 10px;
            /* 上に余白を追加 */
            text-align: center;
            /* コンテナ内の要素を中央に配置 */
        }

        .red-circle {
            color: red;
            /* 赤色に設定 */
        }

        .bold-cross {
            font-weight: bold;
            /* 太文字に設定 */
        }

        .info-text {
            position: relative;
            top: -20px;
            margin-top: 0;
            margin-bottom: 0px;
            font-size: 13px;
            color: #5a4a42;
            line-height: 1.5;
            text-align: center;
            word-wrap: break-word;
            background-color: #fffcf8;
            padding: 0px;
            border-radius: 0 0 10px 10px;
            border: 1px solid #f2cc8f;
            border-top: none;
        }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .info-text {
                font-size: 11.5px;
                top: -20px;
                /* ← モバイルでは少し控えめに上にずらす */
                line-height: 2.0;
            }
        }

        .symptoms {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Blocks removed for cleanup */

        .highlight-text {
            display: inline-block;
            color: #5a4a42;
            /* オプションテキストの色 */
            font-weight: 700;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: -6px 0;
        }

        hr {
            margin: -5px 0;
        }

        .edit-button {
            background-color: #ffffff;
            color: #5a4a42;
            border: 1px solid #f2cc8f;
            border-radius: 15px;
            padding: 5px 15px;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
            width: auto;
            text-align: center;
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        .edit-button:hover {
            background-color: #fff9f0;
            color: #e76f51;
            border-color: #e76f51;
        }

        /* 100点の予約フォームCSS */

        /* Removed empty rule */

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #3e3f41;
            color: #000000;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #e9e9e9;
            transform: scale(1.05);
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #272727;
            margin-top: 12px;
            /* ← ここで下方向にずらす */
        }

        .submit-button:hover {
            background-color: #ffffff;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            input,
            button {
                font-size: 14px;
            }
        }

        button.active {
            outline: 1px solid #2b2b2b;
            /* ここで枠線を指定 */
            outline-offset: 2px;
        }

        /* 必須マークのスタイル */
        .required {
            color: #ffffff;
            /* ゴールド（黄色） */
            font-weight: lighter;
            /* 文字を細くする */
            font-size: 0.6em;
            margin-left: 5px;
            vertical-align: 0.8em;
            /* 位置を少し上に調整 */

            /* 白色背景の四角形 */
            background-color: rgb(255, 15, 15);
            padding: 0 5px;
            border-radius: 3px;
            margin-right: 5px;
        }

        .current-month {
            text-align: center;
            display: block;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -10px);
            /* Y方向に上げる */
            background-color: #3e3f41;
            color: #fff;
            padding: 3px 12px;
            /* ボックスのパディングを縮小 */
            border-radius: 8px;
            /* 角の丸みを少し減少 */
            font-size: 1.4rem;
            /* フォントサイズを小さく */
            font-weight: 300;
            box-shadow: 0 2px 6px rgba(47, 103, 167, 0.2);
            /* 影も控えめに */
        }

        /* ナビゲーションバー */
        .sidebar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #1e1e2d;
            padding: 10px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            padding: 15px;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            margin-bottom: 10px;
            background: #4a90e2;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .sidebar a:hover {
            background: #357ac4;
        }

        /* スクロール用のセクション */
        .section {
            padding: 50px 10px;
            margin-top: 30px;
        }

        .repeat-booking-wrapper {
            text-align: center;
            margin: 20px 0;
        }

        #repeatBookingButton {
            background-color: #f7f7f7;
            color: #000000;
            border: 1px solid #000000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }

        #repeatBookingButton:hover {
            background-color: #f1f1f1;
            color: #000000;
        }

        #selected-menus-display .menu-items-wrapper {
            display: flex;
            flex-direction: column;
            /* 横並びではなく縦に並べる */
            gap: 12px;
        }

        #selected-menus-display .menu-item {
            width: 100%;
            /* 横幅いっぱいに */
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #97ac66;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
            transition: background-color 0.3s;
            word-break: break-word;
            box-sizing: border-box;
        }

        #selected-menus-display {
            /* 既存のスタイルに追加でOK */
            text-align: center;
        }

        #selected-menus-display::before {
            content: "選択中のメニュー（最大3つまで）";
            display: block;
            width: 100%;
            font-size: 16px;
            font-weight: 100;
            /* ← 細いフォント（最小値は100） */
            padding: 4px 16px;
            background-color: #ffffff;
            color: #0a0a0a;
            border: 3px solid #0a0a0a;
            border-radius: 4px;
            box-shadow: 0 1px 3px rgba(255, 255, 255, 0.05);
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }


        #selected-menus-display .menu-items-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: flex-start;
        }

        #selected-menus-display .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 100%;
            background-color: #ececec;
            padding: 1px 12px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
            transition: background-color 0.3s;
            flex: 1 1 auto;
            min-width: 200px;

            /* ここを追加 */
            position: relative;

    <script>

        let selectedFullDate = '';
        let currentDate = new Date();
        let availabilityCache = {};

        let totalAmount = 0; // 合計金額を格納する変数
        let menuPrice = 0; // メニューの価格
        let optionsPrice = 0; // オプションの合計価格

        document.addEventListener('DOMContentLoaded', function () {
            liff.init({
                liffId: '2005254357-zKma9BZk'
            }).then(() => {
                console.log('LIFF初期化成功');
            }).catch((err) => {
                console.log('LIFF初期化失敗', err);
            });

            fetchAvailability(currentDate);
        });

        // 訪問回数ごとの時間設定 (例：初めて=20分、2回目以降=15分)
        let visitTimes = {
            '1回目〈30分〉': 30,
            '2回目以降〈0分〉': 0
        };

        let selectedVisitTime = 0; // 訪問回数で選択された時間

        // 訪問回数ごとの時間設定 (例：初めて=20分、2回目以降=15分)
        let irradiationsTimes = {
            '30分延長 (30分)': 30,
            '1時間延長 (60分)': 60,
            '2時間延長 (120分)': 120,
            '離乳食': 0,
            'お風呂': 0,
            'おっぱいケア': 30
        };

        let selectedirradiationsTime = 0; // 訪問回数で選択された時間

        let menuTimes = {
            '一時預かり【３時間】 (180分)': 180,
            '一時預かり【６時間】 (360分)': 360,
            'ベビーシッター【３時間】 (180分)': 180,
            'ベビーシッター【６時間】 (360分)': 360,
            'ベビーシッター【８時間】 (480分)': 480,
            'ベビーシッター【１２時間】 (720分)': 720,
            'おっぱいケア【30分】 (30分)': 30,
            'おっぱいケア【１時間】 (60分)': 60,
            'おっぱいケア【１時間30分】 (90分)': 90
        };


        let selectedMenuTime = 0;

        // 入力内容をローカルストレージに保存
        function saveInput(id) {
            const value = document.getElementById(id).value;
            localStorage.setItem(id, value);
        }

        // ページが読み込まれたときに前回の入力内容を復元
        document.addEventListener('DOMContentLoaded', function () {
            const savedName = localStorage.getItem('name');
            const savedPhone = localStorage.getItem('phone');

            if (savedName) document.getElementById('name').value = savedName;
            if (savedPhone) document.getElementById('phone').value = savedPhone;
        });

        // スムーズスクロール
        document.querySelectorAll('.side-nav a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 20,
                        behavior: 'smooth'
                    });
                }
            });
        });

        function updateDisplayInfo() {
            const name = document.getElementById('name').value;
            const babyFoodText = babyFoodNeeded ? `<span style="color:#0c0c0c;"><strong>離乳食</strong></span>：${babyFoodNeeded}` : '・離乳食の有無が未選択です';
            const visitCountText = visitCount ? `<span style="color:#0c0c0c;"><strong>来店回数</strong></span>：${visitCount}` : '・来店回数が未選択です';
            const selectedMenuText = selectedMenu ? `<span style="color#0c0c0c;"><strong>コース</strong></span>：${selectedMenu}` : '・コースが未選択です';

            const selectedSymptomText = selectedSymptom.length > 0
                ? `<span style="color:#0c0c0c;"><strong>メニュー</strong></span><br>・${selectedSymptom.map(item => `《${item.category}》${item.name}`).join('<br>・')}`
                : '・メニューが未選択です';

            const irradiationsText = irradiationsCount
                ? `<span style="color:#0c0c0c;"><strong>オプション</strong></span><br>・${irradiationsCount.split(', ').join('<br>・')}`
                : '・オプション無し';

            let totalMinutes = selectedMenuTime + selectedirradiationsTime + selectedVisitTime;
            let hours = Math.floor(totalMinutes / 60);
            let minutes = totalMinutes % 60;
            let totalTimeText = `<span style="color:#0c0c0c;"><strong>所要時間</strong></span>：${hours > 0 ? hours + '時間' : ''}${minutes}分`;

            const totalAmountText = `<span style="color:#0c0c0c;"><strong>合計金額</strong></span>：¥${menuPrice + optionsPrice}`;
            const selectedDateText = selectedFullDate ? `<span style="color:#0c0c0c;"><strong>希望日時</strong></span>：${selectedFullDate}` : '・日時が未選択です';

            // 修正ボタン付きのHTMLを作成
            document.getElementById('displayInfo').innerHTML = `
        <div class="info-row">
            <p><span style="color:#0c0c0c;"><strong>お名前</strong></span>：${name}</p>
            <button class="edit-button" onclick="scrollToElement('name')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${babyFoodText}</p>
            <button class="edit-button" onclick="scrollToElement('babyFoodYes')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${visitCountText}</p>
            <button class="edit-button" onclick="scrollToElement('firstVisit')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${selectedMenuText}</p>
            <button class="edit-button" onclick="scrollToElement('course')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${selectedSymptomText}</p>
            <button class="edit-button" onclick="scrollToElement('temporary'); scrollToElement('babysitter'); scrollToElement('breastcare');">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${irradiationsText}</p>
            <button class="edit-button" onclick="scrollToElement('temporary')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${totalTimeText}</p>
        </div>
        <hr>
        <div class="info-row">
            <p>${selectedDateText}</p>
            <button class="edit-button" onclick="scrollToElement('calendar1')">修正</button>
        </div>
        <hr>
        <div class="info-row">
            <p>${totalAmountText}</p>
        </div>
        <hr>
    `;
        }

        // スクロール関数
        function scrollToElement(id) {
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // 各ボタンや入力フィールドでupdateDisplayInfoを呼び出すようにする
        document.getElementById('name').addEventListener('input', updateDisplayInfo);
        document.querySelectorAll('.visit-buttons button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });
        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });
        document.querySelectorAll('.irradiations button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });

        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', () => {
                const calendarContainer = document.querySelector('.calendar-container');

                // 選択されたメニューがあればカレンダーを表示
                if (document.querySelectorAll('.symptoms button.active').length > 0) {
                    calendarContainer.style.display = 'block';
                } else {
                    // 選択が解除された場合、カレンダーを非表示
                    calendarContainer.style.display = 'none';
                }
            });
        });

        // 初期状態でカレンダーを非表示にする
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.calendar-container').style.display = 'none';
        });

        // 日付セルのクリックイベントで希望日時を更新
        document.querySelectorAll('.calendar td').forEach(cell => {
            cell.addEventListener('click', () => {
                selectDate(cell);
                updateDisplayInfo();  // 日付を選択したら即座に表示を更新
            });
        });

        function selectSymptom(button, treatmentId) {
            // 選択された日時をリセット
            selectedFullDate = '';

            const treatmentText = document.getElementById('treatment-text');
            const selectedMenusDisplay = document.getElementById("selected-menus-display");
            const selectedMenuNameDiv = document.getElementById('selected-menu-name');

            // トグル
            if (button.classList.contains('active')) {
                button.classList.remove('active'); // ← 解除
            } else {
                const activeCount = document.querySelectorAll('.symptoms button.active').length;
                if (activeCount >= 4) return;
                button.classList.add('active');    // ← 選択
            }

            // 最新状態
            const updatedSelectedButtons = document.querySelectorAll('.symptoms button.active');

            // リセット
            selectedMenuTime = 0;
            selectedSymptom = [];
            menuPrice = 0;

            // 0件ならすべて隠す
            if (updatedSelectedButtons.length === 0) {
                if (treatmentText) {
                    treatmentText.style.display = 'none';
                    treatmentText.innerHTML = '';
                }
                selectedMenusDisplay.style.display = 'none';
                selectedMenusDisplay.innerHTML = '';
                if (selectedMenuNameDiv) selectedMenuNameDiv.style.display = 'none';
                return;
            }

            // 選択済みから再計算
            updatedSelectedButtons.forEach((btn) => {
                const selectedMenuName = btn.textContent;
                const category = btn.getAttribute('data-category');
                selectedSymptom.push({ category, name: selectedMenuName });
                selectedMenuTime += menuTimes[selectedMenuName] || 0;
                menuPrice += parseInt(btn.getAttribute('data-price'), 10) || 0;
            });

            // カレンダー更新
            if (typeof fetchAvailability === 'function') {
                fetchAvailability(currentDate);
            }

            // --- ここがポイント ---
            // 解除クリックの場合（このボタンが非activeになった後）は詳細を表示しない
            if (!button.classList.contains('active')) {
                if (treatmentText) {
                    treatmentText.style.display = 'none';
                    treatmentText.innerHTML = '';
                }
            } else {
                // 表示内容を treatmentId で分岐（未指定/不一致なら表示しない）
                let html = '';
                if (treatmentId === 'treatment1') {
                    html = `<div style="text-align: left;"><strong>所要時間：90分</strong><br>※症状によりお時間が前後する場合がございます</div><div style="text-align: right;"><strong>料金：6,500円<br>初診料：＋2,200円</strong></div>`;
                } else if (treatmentId === 'treatment2') {
                    html = `<div style="text-align: left;"><strong>所要時間：60分</strong><br>※症状によりお時間が前後する場合がございます</div><div style="text-align: right;"><strong>料金：4,500円<br>初診料：＋2,200円</strong></div>`;
                } else if (treatmentId === 'treatment3') {
                    html = `<div style="text-align: left;"><strong>所要時間：120分</strong><br>※症状によりお時間が前後する場合がございます</div><div style="text-align: right;"><strong>料金：8,700円<br>初診料：＋2,200円</strong></div>`;
                } else if (treatmentId === 'treatment4') {

        async function fetchAvailability(date) {
            const startTime = new Date(date);
            const endTime = new Date(date);
            endTime.setDate(endTime.getDate() + 7);

            const cacheKey = startTime.toISOString() + endTime.toISOString();

            // キャッシュを確認
            if (availabilityCache[cacheKey]) {
                console.log('Using cached data');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays);
                return;
            }

            const url = 'https://script.google.com/macros/s/AKfycbzgesmVv83Oy7jRS_DoiYgk8NqB50jD7NzUGGmjHoAxnaKwBVDbRzjFIbm5sIvJJbHA/exec' +
                `?startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`;

            try {
                showLoadingSpinner(); // Show loading spinner
                const response = await fetch(url);
                const data = await response.json();
                console.log(data);

                // 営業日の情報を抽出
                const businessDays = data.filter(event => event.summary === "営業日").map(event => {
                    return {
                        start: new Date(event.startTime),
                        end: new Date(event.endTime)
                    };
                });

                // データをキャッシュに保存
                availabilityCache[cacheKey] = { availability: data, businessDays: businessDays };

                updateCalendar(data, businessDays);
            } catch (error) {
                console.error('Error fetching availability:', error);
            } finally {
                hideLoadingSpinner(); // Hide loading spinner
            }
        }

        function updateCalendar(availability, businessDays) {
            const calendar = document.getElementById('calendar1');
            const table = calendar.querySelector('table tbody');

            const times = [
                '09:00', '09:30', '10:00', '10:30', '11:00', '11:30',
                '12:00', '12:30', '13:00', '13:30',
                '14:00', '14:30', '15:00', '15:30',
                '16:00', '16:30', '17:00'
            ];

            if (table.rows.length === 0) {
                for (const time of times) {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);

                    for (let i = 0; i < 7; i++) {
                        const cell = document.createElement('td');
                        cell.addEventListener('click', () => selectDate(cell));
                        row.appendChild(cell);
                    }

                    table.appendChild(row);
                }
            }

            // テーブルのヘッダーを更新
            updateCalendarHeader(currentDate);

            // 各セルを空白にリセットし、クラスもリセット
            for (let row of table.rows) {
                for (let i = 1; i < row.cells.length; i++) {
                    row.cells[i].textContent = '';
                    row.cells[i].removeAttribute('data-date');
                    row.cells[i].classList.remove('available', 'unavailable', 'selected');
                }
            }

            // 現在の日時を取得
            const now = new Date();

            // テーブルの内容を更新
            for (let i = 0; i < 7; i++) {
                const day = new Date(currentDate);
                day.setDate(day.getDate() + i);

                let businessEventTimes = []; // 営業日のイベント時間帯を記録する配列

                availability.forEach(slot => {
                    const eventStart = new Date(slot.startTime);
                    const eventEnd = new Date(slot.endTime);
                    if (eventStart.toDateString() === day.toDateString() && slot.title === "営業日") {
                        businessEventTimes.push({ start: eventStart, end: eventEnd });
                    }
                });

                for (let j = 0; j < times.length; j++) {
                    const cell = table.rows[j].cells[i + 1];

                    const slotStart = new Date(day);
                    slotStart.setHours(parseInt(times[j].split(':')[0]), parseInt(times[j].split(':')[1]), 0, 0);

                    let slotEnd = new Date(slotStart);
                    let menuDuration = selectedMenuTime || 10;
                    let visitDuration = selectedVisitTime || 0;
                    let irradiationsDuration = selectedirradiationsTime || 0;

                    // 仮に終了時間を計算
                    slotEnd.setMinutes(slotStart.getMinutes() + menuDuration + visitDuration + irradiationsDuration);

                    // 日付を跨ぐ場合は✕
                    if (slotEnd.getDate() !== slotStart.getDate()) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 過去の時間は✕
                    if (slotStart < now) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 当日の営業時間内かどうか（Googleカレンダーイベント）
                    const isBusinessEventTime = businessEventTimes.some(event => {
                        return slotStart >= event.start && slotEnd <= event.end;
                    });

                    // 通常の営業日（手動設定されたbusinessDays）
                    const isBusinessDay = businessDays.some(businessDay => {
                        const businessDayStart = new Date(businessDay.start);
                        const businessDayEnd = new Date(businessDay.end);
                        return slotStart >= businessDayStart && slotEnd <= businessDayEnd;
                    });

                    // 営業日以外の重複イベントを取得
                    const relevantEvents = availability.filter(slot => {
                        const eventStart = new Date(slot.startTime);
                        const eventEnd = new Date(slot.endTime);
                        return slot.title !== "営業日" && eventStart < slotEnd && eventEnd > slotStart;
                    });

                    // 同時刻に3件以上予約があると✕
                    let overLimit = false;

                    // 重複チェックロジック（修正版）
                    for (let checkTime = new Date(slotStart.getTime()); checkTime < slotEnd; checkTime.setMinutes(checkTime.getMinutes() + 1)) {
                        let overlapping = 1;
                        relevantEvents.forEach(slot => {
                            // ▼▼▼ ここから変更 ▼▼▼
                            if (new Date(slot.startTime) <= checkTime && new Date(slot.endTime) > checkTime) {
                                // 説明文に「洋装プランA〈60分〉」が含まれていれば+2（これだけで枠が埋まる）、それ以外は通常通り+1
                                if (slot.description && slot.description.includes('・洋装プランA〈60分〉')) {
                                    overlapping += 3;
                                } else {
                                    overlapping++;
                                }
                            }
                            // ▲▲▲ ここまで変更 ▲▲▲
                        });
                        if (overlapping >= 3) { overLimit = true; break; }
                    }

                    // 最終的な可否判定
                    if (isBusinessEventTime && !overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else if (isBusinessEventTime && overLimit) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');;
                    } else if (isBusinessDay && !overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else if (!isBusinessEventTime && businessEventTimes.length > 0) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    } else if (!overLimit) {
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }


                    // セルにこの時間帯のデータ属性を追加（ISO形式の日時）
                    cell.setAttribute('data-date', slotStart.toISOString());
                }
            }
        }

                '2028-08-11', // 山の日
                '2028-09-18', // 敬老の日
                '2028-09-22', // 秋分の日
                '2028-10-09', // 体育の日
                '2028-11-03', // 文化の日
                '2028-11-23'  // 勤労感謝の日
            ];

            const startDate = new Date(date);
            headers.forEach((th, index) => {
                const day = new Date(startDate);
                day.setDate(day.getDate() + index);

                const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'];
                const formattedDate = `${day.getFullYear()}-${(day.getMonth() + 1).toString().padStart(2, '0')}-${day.getDate().toString().padStart(2, '0')}`;
                const dayString = `${day.getDate()}(${dayOfWeek[day.getDay()]})`;

                th.innerHTML = dayString.replace('(', '<br>(');

                // 祝日を赤色に変更（曜日判定ではなく完全一致判定）
                if (holidays.includes(formattedDate)) {
                    th.style.color = 'red';
                } else if (day.getDay() === 0) { // 日曜日（赤）
                    th.style.color = 'red';
                } else if (day.getDay() === 6) { // 土曜日（青）
                    th.style.color = 'blue';
                } else {
                    th.style.color = ''; // 通常色にリセット
                }
            });

            // 現在の月を表示
            const currentMonthElement = document.getElementById('currentMonth');
            currentMonthElement.innerHTML = `<span class="year">${startDate.getFullYear()}年</span><br><span class="month">${startDate.getMonth() + 1}月</span>`;

        }

        function nextmonth() {
            currentDate.setMonth(currentDate.getMonth() + 1); // 翌月に移動
            currentDate.setDate(1); // 1日に設定
            fetchAvailability(currentDate);
        }

        function previousmonth() {
            currentDate.setMonth(currentDate.getMonth() - 1); // 前月に移動
            currentDate.setDate(1); // 1日に設定
            fetchAvailability(currentDate);
        }

        function nextWeek() {
            currentDate.setDate(currentDate.getDate() + 7);
            fetchAvailability(currentDate);
        }

        function previousWeek() {
            currentDate.setDate(currentDate.getDate() - 7);
            fetchAvailability(currentDate);
        }

        function showLoadingSpinner() {
            document.getElementById('loadingSpinner').style.display = 'block';
        }

        function hideLoadingSpinner() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
    </script>
</body>

</html>
